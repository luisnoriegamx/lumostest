<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PsychoArt Pro | Análisis Proyectivo Clínico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        :root { --primary: #1a365d; --primary-light: #2c5282; --secondary: #4a5568; --accent: #e53e3e; --success: #2f855a; --warning: #ed8936; --bg-light: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #e9ecef; min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 40px; text-align: center; }
        .app-logo { width: 80px; margin-bottom: 20px; opacity: 0.9; }
        .header h1 { margin: 0; font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
        .header p { margin: 12px 0 0; opacity: 0.8; font-size: 0.95rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .content { padding: 40px; background: #f8fafc; }
        .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-bottom: 24px; background: white; padding: 16px 24px; border-radius: 60px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .status-indicator { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 8px 16px; border-radius: 40px; }
        .led { width: 12px; height: 12px; border-radius: 50%; background-color: var(--success); box-shadow: 0 0 0 2px rgba(47, 133, 90, 0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } }
        .brush-control { display: flex; align-items: center; gap: 16px; }
        input[type="range"] { width: 160px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; cursor: pointer; border: none; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); }
        .btn-danger { background: #ef4444; color: white; border: none; }
        .btn-secondary { background: #475569; color: white; border: none; }
        .canvas-wrapper { background: white; border-radius: 24px; padding: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 24px; position: relative; }
        canvas { display: block; width: 100%; height: auto; background: white; border-radius: 16px; cursor: crosshair; touch-action: none; border: 1px solid #e2e8f0; }
        .analyze-btn { width: 100%; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; border: none; padding: 18px; font-size: 1.1rem; font-weight: 700; border-radius: 60px; cursor: pointer; transition: all 0.3s; margin-top: 16px; }
        .analyze-btn:hover { transform: scale(1.02); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-card { background: white; border-radius: 32px; max-width: 900px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px black; }
        .modal-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: white; }
        .modal-body { flex: 1; overflow-y: auto; padding: 24px; background: #f9fafb; }
        .modal-body iframe { width: 100%; height: 100%; min-height: 500px; border: none; background: white; border-radius: 16px; }
        .progress-container { text-align: center; padding: 40px; }
        .progress-bar { background: #e2e8f0; border-radius: 30px; height: 8px; overflow: hidden; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--success); transition: width 0.4s ease; }
        .hidden { display: none !important; }
        @media (max-width: 768px) { .content { padding: 20px; } .toolbar { flex-direction: column; align-items: stretch; border-radius: 24px; } .btn-group { justify-content: center; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <svg class="app-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <h1>PsychoArt Pro</h1>
        <p>Sistema Clínico de Análisis Proyectivo | Test de la Figura Humana</p>
    </div>

    <div class="content">
        <div class="toolbar">
            <div class="status-indicator">
                <div class="led"></div>
                <span style="font-size: 0.85rem; font-weight: 500;">Motor Clínico | Machover</span>
            </div>
            <div class="brush-control">
                <span style="font-size: 0.8rem;">✏️ Grosor del Trazo</span>
                <input type="range" id="brushSize" min="1" max="20" value="2">
                <span id="brushValue" style="min-width: 35px;">2px</span>
            </div>
            <div class="btn-group">
                <button class="btn" id="clearBtn">🗑 Limpiar</button>
                <button class="btn" id="undoBtn">↩ Deshacer</button>
                <button class="btn" id="downloadBtn">💾 Guardar</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="drawingCanvas" width="900" height="650" style="width:100%; height:auto; background:#fff;"></canvas>
            <div style="position: absolute; bottom: 16px; right: 16px; display: flex; gap: 8px; opacity: 0.6;">
                <button class="icon-btn" id="fullscreenBtn" style="background: white; border: 1px solid #ddd; border-radius: 30px; padding: 6px 12px;">⛶ Expandir</button>
            </div>
        </div>

        <button class="analyze-btn" id="analyzeBtn">
            🧠 Generar Informe Clínico (Análisis de Trazos)
        </button>
        <p style="font-size: 11px; text-align: center; color: #6c757d; margin-top: 16px;">Basado en criterios del Test Proyectivo de Karen Machover (Figura Humana)</p>
    </div>
</div>

<div id="progressModal" class="modal hidden">
    <div class="modal-card" style="max-width: 400px;">
        <div class="progress-container">
            <h3 style="margin-bottom: 16px;">Procesando Indicadores Gráficos</h3>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="progressText" style="margin-top: 16px; color: #4b5563;">Analizando presión y ubicación...</p>
        </div>
    </div>
</div>

<div id="reportModal" class="modal hidden">
    <div class="modal-card">
        <div class="modal-header">
            <h2>📄 Informe Psodiagnóstico</h2>
            <button class="close-modal" id="closeModalBtn" style="background: none; border: none; font-size: 28px; cursor: pointer;">&times;</button>
        </div>
        <div class="modal-body">
            <iframe id="reportIframe"></iframe>
        </div>
        <div style="padding: 16px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 12px;">
            <button class="btn btn-secondary" id="copyReportBtn">📋 Copiar</button>
            <button class="btn btn-primary" id="savePdfBtn">📄 Guardar PDF</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- Setup Canvas ----------
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let history = [];
        let historyIndex = -1;

        function resizeCanvas() {
            // Mantener resolución fija para el análisis 900x650
            canvas.width = 900;
            canvas.height = 650;
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = parseInt(document.getElementById('brushSize').value);
            ctx.strokeStyle = '#1a1a1a';
            saveState();
        }

        function saveState() {
            history = history.slice(0, historyIndex + 1);
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            historyIndex = history.length - 1;
            if (history.length > 30) history.shift();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                ctx.putImageData(history[historyIndex], 0, 0);
            }
        }

        function clearCanvas() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            else { clientX = e.clientX; clientY = e.clientY; }
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            return [Math.min(Math.max(0, x), canvas.width), Math.min(Math.max(0, y), canvas.height)];
        }

        function startDraw(e) { e.preventDefault(); isDrawing = true; const [x, y] = getCoords(e); lastX = x; lastY = y; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+0.5, y+0.5); ctx.stroke(); }
        function draw(e) { if (!isDrawing) return; e.preventDefault(); const [x, y] = getCoords(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke(); lastX = x; lastY = y; }
        function endDraw() { if(isDrawing) { isDrawing = false; saveState(); } }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);
        canvas.addEventListener('touchstart', startDraw, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', endDraw);

        document.getElementById('brushSize').addEventListener('input', (e) => { ctx.lineWidth = parseInt(e.target.value); document.getElementById('brushValue').innerText = e.target.value + 'px'; });
        document.getElementById('clearBtn').onclick = clearCanvas;
        document.getElementById('undoBtn').onclick = undo;
        document.getElementById('downloadBtn').onclick = () => { const link = document.createElement('a'); link.download = 'test_proyectivo.png'; link.href = canvas.toDataURL(); link.click(); };

        resizeCanvas();
        saveState();

        // ---------- ANALISIS CLINICO PRO (Basado en Machover) ----------
        function analyzeDrawing() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = '#FFFFFF';
            tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tCtx.drawImage(canvas, 0, 0);
            const imgData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imgData.data;
            
            let minX = tempCanvas.width, maxX = 0, minY = tempCanvas.height, maxY = 0;
            let darkPixels = 0, totalIntensity = 0;
            let totalPixels = tempCanvas.width * tempCanvas.height;
            
            // Detección de características
            for (let y = 0; y < tempCanvas.height; y++) {
                for (let x = 0; x < tempCanvas.width; x++) {
                    const idx = (y * tempCanvas.width + x) * 4;
                    const r = data[idx], g = data[idx+1], b = data[idx+2];
                    const brightness = (r + g + b) / 3;
                    if (brightness < 250) {
                        darkPixels++;
                        totalIntensity += (255 - brightness);
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            
            const density = darkPixels / totalPixels;
            const avgPressure = darkPixels > 0 ? (totalIntensity / darkPixels) / 255 : 0; // 0..1
            const centerX = (minX + maxX) / 2 / tempCanvas.width;
            const centerY = (minY + maxY) / 2 / tempCanvas.height;
            const widthSize = (maxX - minX) / tempCanvas.width;
            const heightSize = (maxY - minY) / tempCanvas.height;
            const sizeRatio = widthSize * heightSize;
            
            // Indicadores Clínicos (Machover)
            let diagnosis = [];
            let clinicalNotes = [];
            
            // 1. Presión del Trazo (Energía / Ansiedad)
            let pressureLevel = "moderada";
            if (avgPressure > 0.6) { pressureLevel = "muy fuerte (alta tensión/agresividad)"; clinicalNotes.push("Trazo con presión excesiva sugiere impulsividad o ansiedad intensa [citation:3]."); }
            else if (avgPressure < 0.2) { pressureLevel = "débil (inseguridad/timidez)"; clinicalNotes.push("Líneas débiles o temblorosas indican falta de confianza o astenia [citation:7]."); }
            
            // 2. Tamaño (Autoestima)
            let sizeDesc = "mediano";
            if (sizeRatio < 0.05) { sizeDesc = "muy pequeño (sentimiento de inferioridad)"; clinicalNotes.push("Figura de tamaño reducido sugiere inseguridad y retraimiento social [citation:3]."); }
            else if (sizeRatio > 0.25) { sizeDesc = "grande (necesidad de protagonismo)"; clinicalNotes.push("Figura de gran tamaño indica posible grandiosidad o exhibicionismo [citation:5]."); }
            
            // 3. Ubicación (Relación con el entorno)
            let locationDesc = "";
            if (centerY < 0.33) locationDesc = "parte superior (tendencia a la fantasía/aislamiento)";
            else if (centerY > 0.66) locationDesc = "parte inferior (pragmatismo / inseguridad base)";
            if (centerX < 0.3) clinicalNotes.push("Dibujo desplazado a la izquierda (vuelta hacia el pasado/introversión).");
            if (centerX > 0.7) clinicalNotes.push("Dibujo desplazado a la derecha (orientación al futuro/extroversión).");
            
            // 4. Detalles patognomónicos (Borrones, exceso de líneas)
            let hasErasures = false;
            // Detectamos "ruido" en el dibujo (píxeles aislados)
            let noiseCount = 0;
            for (let y = 1; y < tempCanvas.height-1; y++) {
                for (let x = 1; x < tempCanvas.width-1; x++) {
                    const idx = (y * tempCanvas.width + x) * 4;
                    if (data[idx] < 250) {
                        let neighbors = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if(dx===0 && dy===0) continue;
                                const nIdx = ((y+dy) * tempCanvas.width + (x+dx)) * 4;
                                if(data[nIdx] < 250) neighbors++;
                            }
                        }
                        if(neighbors === 0) noiseCount++;
                    }
                }
            }
            if(noiseCount > 50) clinicalNotes.push("Presencia de trazos erráticos o borraduras, indicador clásico de ansiedad e inseguridad [citation:7].");
            
            // 5. Calculo de Rasgos adaptados (Escala 0-100)
            let energia = Math.min(95, Math.max(15, Math.round(avgPressure * 100 + density * 30)));
            let estabilidad = Math.min(95, Math.max(20, Math.round(70 - (Math.abs(centerX-0.5)*60) - (noiseCount > 50 ? 20 : 0))));
            let creatividad = Math.min(95, Math.max(15, Math.round(40 + (sizeRatio * 100) + (density > 0.1 ? 10 : 0))));
            let autoestima = Math.min(95, Math.max(15, Math.round(50 + (1 - Math.abs(centerY-0.5))*40 + (sizeRatio * 50))));
            
            // ID del reporte
            const id = `PSY-${Math.random().toString(36).substring(2, 9).toUpperCase()}`;
            const date = new Date().toLocaleDateString('es-ES', {year:'numeric', month:'long', day:'numeric'});
            
            // Construcción HTML del Informe Profesional
            const reportHTML = `<!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><title>Informe Clínico</title>
            <style>
                body { font-family: 'Inter', sans-serif; background: #f4f6f9; padding: 2rem; margin: 0; }
                .paper { max-width: 850px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); overflow: hidden; }
                .header { background: #0f172a; color: white; padding: 2rem; text-align: center; }
                .header h1 { margin: 0; font-size: 1.8rem; }
                .content { padding: 2rem; }
                .score-card { background: #f8fafc; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid #0f172a; }
                .badge { background: #e2e8f0; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; color: #1e293b; display: inline-block; margin-bottom: 12px; }
                .trait { margin-bottom: 1.5rem; }
                .trait-label { font-weight: 700; margin-bottom: 6px; display: flex; justify-content: space-between; }
                .bar { background: #e2e8f0; border-radius: 12px; height: 10px; overflow: hidden; }
                .bar-fill { background: #0f172a; width: 0%; height: 100%; border-radius: 12px; }
                .clinical-note { background: #fff9db; padding: 1rem; border-radius: 16px; margin-top: 1rem; font-size: 0.85rem; border-left: 3px solid #f59e0b; }
                footer { font-size: 0.7rem; text-align: center; padding: 1.5rem; border-top: 1px solid #e2e8f0; color: #64748b; }
            </style>
            </head>
            <body>
            <div class="paper">
                <div class="header">
                    <h1>📋 Informe de Evaluación Proyectiva</h1>
                    <p>Test de la Figura Humana (Machover) | Sistema Clínico PsychoArt</p>
                </div>
                <div class="content">
                    <div class="score-card">
                        <div class="badge">ID: ${id}</div>
                        <div><strong>Fecha de análisis:</strong> ${date}</div>
                        <div><strong>Indicadores gráficos detectados:</strong> Tamaño ${sizeDesc} | Presión ${pressureLevel} | Ubicación predominante: ${locationDesc || "centrada"}</div>
                    </div>
                    
                    <h3 style="margin-bottom: 16px;">📊 Índices de Personalidad</h3>
                    <div class="trait"><div class="trait-label"><span>⚡ Energía / Impulso</span><span>${energia}%</span></div><div class="bar"><div class="bar-fill" style="width: ${energia}%;"></div></div><p style="font-size: 0.8rem; margin-top: 4px;">${avgPressure > 0.5 ? "Alta activación psicomotora, posible ansiedad." : "Nivel energético regulado, tendencia a la contención."}</p></div>
                    <div class="trait"><div class="trait-label"><span>🧠 Estabilidad Emocional</span><span>${estabilidad}%</span></div><div class="bar"><div class="bar-fill" style="width: ${estabilidad}%;"></div></div><p style="font-size: 0.8rem;">Evaluado por continuidad del trazo y ubicación en el espacio gráfico.</p></div>
                    <div class="trait"><div class="trait-label"><span>🎨 Creatividad / Apertura</span><span>${creatividad}%</span></div><div class="bar"><div class="bar-fill" style="width: ${creatividad}%;"></div></div><p style="font-size: 0.8rem;">Relacionado con la riqueza de detalles y originalidad de la figura.</p></div>
                    <div class="trait"><div class="trait-label"><span>💪 Autoestima / Seguridad</span><span>${autoestima}%</span></div><div class="bar"><div class="bar-fill" style="width: ${autoestima}%;"></div></div><p style="font-size: 0.8rem;">${sizeRatio > 0.2 ? "Proyección de grandiosidad o necesidad de reconocimiento." : "Modestia en la autopercepción."}</p></div>
                    
                    <div class="clinical-note">
                        <strong>🔍 Observaciones Clínicas (basado en indicadores de Machover):</strong>
                        <ul style="margin-top: 8px; padding-left: 20px;">
                            ${clinicalNotes.map(n => `<li>${n}</li>`).join('')}
                            ${clinicalNotes.length === 0 ? '<li>No se aprecian indicadores patognomónicos significativos en este cuadro.</li>' : ''}
                        </ul>
                        <p style="margin-top: 8px; font-style: italic;">*La interpretación se fundamenta en la relación entre el tamaño del dibujo, la presión del trazo y la ubicación. Evidencia empírica sugiere que trazos firmes denotan seguridad, mientras que los trazados débiles correlacionan con introversión [citation:3].</p>
                    </div>
                    
                    <div style="margin-top: 24px; background: #f1f5f9; border-radius: 16px; padding: 16px;">
                        <h4>📌 Recomendaciones para Selección de Talento</h4>
                        <p>Basado en el perfil gráfico proyectado, se sugiere:</p>
                        <ul>
                            <li>${energia > 70 ? "Candidato con alta energía: apto para roles de liderazgo y gestión de crisis." : "Perfil reflexivo: ideal para tareas analíticas o de investigación."}</li>
                            <li>${estabilidad > 70 ? "Alta tolerancia al estrés, se adapta bien a entornos cambiantes." : "Requiere ambientes laborales estructurados para optimizar rendimiento."}</li>
                        </ul>
                    </div>
                    
                    <footer>
                        ⚠️ Este informe es una herramienta complementaria basada en el análisis no supervisado de indicadores proyectivos. No sustituye una entrevista psicológica formal ni un diagnóstico clínico. Basado en la teoría de Karen Machover.
                    </footer>
                </div>
            </div>
            </body>
            </html>`;
            
            return reportHTML;
        }
        
        // ---------- UI Logic ----------
        const progressModal = document.getElementById('progressModal');
        const reportModal = document.getElementById('reportModal');
        const reportIframe = document.getElementById('reportIframe');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const copyBtn = document.getElementById('copyReportBtn');
        const savePdfBtn = document.getElementById('savePdfBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        
        analyzeBtn.onclick = async () => {
            // Check if drawing exists
            const tempCheck = document.createElement('canvas');
            tempCheck.width = canvas.width; tempCheck.height = canvas.height;
            const tCtx = tempCheck.getContext('2d');
            tCtx.drawImage(canvas, 0, 0);
            const imgData = tCtx.getImageData(0, 0, canvas.width, canvas.height).data;
            let hasPixel = false;
            for(let i=0; i<imgData.length; i+=4) { if(imgData[i] < 250) { hasPixel = true; break; } }
            if(!hasPixel) { alert("⚠️ No se detectó ningún trazo. Realiza un dibujo antes de generar el informe."); return; }
            
            progressModal.classList.remove('hidden');
            let prog = 0;
            const interval = setInterval(() => { prog += 5; if(prog <= 90) { progressFill.style.width = prog + '%'; progressText.innerText = "Analizando indicadores gráficos..."; } }, 100);
            
            setTimeout(async () => {
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressText.innerText = "Interpretación clínica completada.";
                const html = analyzeDrawing();
                reportIframe.srcdoc = html;
                await new Promise(r => setTimeout(r, 300));
                progressModal.classList.add('hidden');
                reportModal.classList.remove('hidden');
            }, 500);
        };
        
        closeModalBtn.onclick = () => reportModal.classList.add('hidden');
        copyBtn.onclick = async () => { 
            try { const doc = reportIframe.contentDocument; await navigator.clipboard.writeText(doc.body.innerText); alert("Informe copiado"); } catch(e) { alert("Error al copiar"); } 
        };
        savePdfBtn.onclick = async () => {
            try { const element = reportIframe.contentDocument.querySelector('.paper'); await html2pdf().set({ margin: 10, filename: `Informe_PsychoArt.pdf` }).from(element).save(); } catch(e) { alert("Error PDF"); }
        };
        document.getElementById('fullscreenBtn').onclick = () => { const elem = document.querySelector('.container'); if(!document.fullscreenElement) elem.requestFullscreen(); else document.exitFullscreen(); };
    })();
</script>
</body>
</html>
